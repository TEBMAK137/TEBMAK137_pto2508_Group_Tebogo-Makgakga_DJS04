<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Vanilla JS Podcast App</title>
    <link rel="stylesheet" href="Vanillastyle.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Header -->
      <header class="app-header">
        <h1>🎧 PodcastApp</h1>
        <p class="subtitle">Find your next favorite show</p>
      </header>

      <!-- Filter Bar (search + dropdowns) -->
      <div class="filter-bar">
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Search podcasts..."
        />
        <div class="dropdown-group">
          <select id="genreFilter" class="styled-dropdown">
            <option value="all">All Genres</option>
            <!-- Genres will be populated by JS -->
          </select>
          <select id="sortFilter" class="styled-dropdown">
            <option value="recent">Recently Updated</option>
            <option value="popular">Most Popular</option>
            <option value="newest">Newest</option>
          </select>
        </div>
      </div>

      <!-- Podcast Grid -->
      <section id="podcastGrid" class="podcast-grid"></section>
    </div>

    <!-- Modal Overlay (hidden by default) -->
    <div
      class="modal-overlay"
      id="modalOverlay"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
    >
      <div class="modal-container">
        <button class="modal-close" id="closeModalBtn" aria-label="Close modal">
          &times;
        </button>
        <div class="modal-inner" id="modalContent"></div>
      </div>
    </div>

    <script src="data.js"></script>
  </body>
</html>

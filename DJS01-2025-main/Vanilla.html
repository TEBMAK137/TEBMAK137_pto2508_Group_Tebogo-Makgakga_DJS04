<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>PodcastHub | Modular Podcast App</title>
    <link rel="stylesheet" href="./styles.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style src="Vanillastyle.css"></style>
  </head>
  <body>
    <div class="container">
      <div class="app-header">
        <h1>🎙️ PodcastHub</h1>
        <p>Modular Web Components • Shadow DOM • Custom Events</p>
      </div>
      <div id="podcastGrid" class="podcast-grid"></div>
      <footer>© 2025 PodcastHub — Fully encapsulated podcast cards</footer>
    </div>

    <!-- Modal structure -->
    <div
      id="modalOverlay"
      class="modal-overlay"
      aria-hidden="true"
      role="dialog"
      aria-modal="true"
    >
      <div class="modal-container">
        <button class="modal-close" id="closeModalBtn" aria-label="Close modal">
          &times;
        </button>
        <div id="modalContent" class="modal-inner"></div>
      </div>
    </div>
    <script type="module" src="main.js"></script>
  </body>
</html>
